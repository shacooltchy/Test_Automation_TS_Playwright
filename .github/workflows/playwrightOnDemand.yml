name: Playwright Tests On Demand

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Test tag (optional)"
        required: false
        type: choice
        options:
          - ""
          - groupTest
          - log_in
          - Product Management Teams
          - smoke
          - regression
          - critical

env:
  BASE_URL: ${{ secrets.BASE_URL }}
  EMAIL: ${{ secrets.EMAIL }}
  PASSWORD: ${{ secrets.PASSWORD }}

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        #run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          TAG="${{ github.event.inputs.tag }}"

          if [ -z "$TAG" ]; then
            echo "No tag specified — running default tests"
            npx playwright test --config=config/playwright.config.ts --grep @smoke
          else
            echo "Running tests with tag: @$TAG"
            npx playwright test --config=config/playwright.config.ts --grep "@$TAG"
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7


