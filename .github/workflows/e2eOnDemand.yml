name: Playwright On Demand

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Select branch"
        required: true
        type: string

      tag:
        description: "Test tag (optional)"
        required: false
        type: choice
        options:
          - ""
          - groupTest
          - log_in
          - Product Management Teams
          - smoke
          - regression
          - critical

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Validate branch exists
        run: |
          BRANCH="${{ github.event.inputs.branch }}"
          echo "Verify branch exists: $BRANCH"

          if git ls-remote --heads origin "$BRANCH" | grep "$BRANCH" > /dev/null; then
            echo "Branch exists — continuing."
          else
            echo "❌ Branch '$BRANCH' does not exist in the repository!"
            exit 1
          fi

      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: |
          TAG="${{ github.event.inputs.tag }}"

          if [ -z "$TAG" ]; then
            echo "No tag specified — running default tests"
            npx playwright test --config=config/playwright.config.ts --grep-invert @log_in
          else
            echo "Running tests with tag: @$TAG"
            npx playwright test --grep "@$TAG"
          fi

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7


